name: Documentation

# This workflow triggers on pull requests targeting the main branch,
# or when manually triggered via the GitHub Actions tab.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Documentation Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Install Doxybook2
        # Fetches the pre-compiled Linux binary, extracts it, and moves it to the system PATH
        run: |
          wget https://github.com/matusnovak/doxybook2/releases/download/v1.5.0/doxybook2-linux-amd64-v1.5.0.zip
          unzip doxybook2-linux-amd64-v1.5.0.zip -d doxybook2_bin
          sudo mv doxybook2_bin/bin/doxybook2 /usr/local/bin/
          rm -rf doxybook2-linux-amd64-v1.5.0.zip doxybook2_bin
          
          # Verify installation
          doxybook2 --version

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Execute Build Script
        env:
          QUARTO_DENO_V8_OPTIONS: "--max-old-space-size=8192,--stack-size=16384"
        run: |
          # Ensure the script is executable (in case file permissions were lost in git)
          chmod +x build_docs.sh
          
          # Run the documentation pipeline
          ./build_docs.sh

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_site
          publish_branch: gh-pages